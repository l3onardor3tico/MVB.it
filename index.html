<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Scolastico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- USERNAME -->
  <section class="section light">
    <h2>Il tuo profilo</h2>
    <input type="text" id="usernameInput" placeholder="Inserisci il tuo username">
    <button onclick="salvaUsername()">Salva</button>
    <p id="usernameDisplay"></p>
  </section>

  <!-- HERO (COPERTINA) -->
  <header class="hero" id="hero">
    <img src="assets/img/copertina.png" alt="Copertina"
         onerror="this.src='copertina.png'">
    <div class="hero-text">
      <h1>Bar Scolastico</h1>
      <p>Il punto di ritrovo della scuola</p>
    </div>
  </header>

  <!-- INTRODUZIONE -->
  <section class="section">
    <h2>Chi siamo</h2>
    <img src="assets/img/introduzione.png" alt="Introduzione"
         class="menu-img"
         onerror="this.src='introduzione.png'">
  </section>

  <!-- CATALOGO -->
  <section class="section light">
    <h2>Menù</h2>

    <img src="assets/img/catalogo1.png" class="menu-img"
         onerror="this.src='catalogo1.png'">

    <img src="assets/img/catalogo2.png" class="menu-img"
         onerror="this.src='catalogo2.png'">

    <img src="assets/img/catalogo3.png" class="menu-img"
         onerror="this.src='catalogo3.png'">

    <img src="assets/img/catalogo4.png" class="menu-img"
         onerror="this.src='catalogo4.png'">

    <img src="assets/img/catalogo5.png" class="menu-img"
         onerror="this.src='catalogo5.png'">

  </section>

  <!-- ORARI -->
  <section class="section">
    <h2>Orari</h2>
    <p>Lunedì – Venerdì</p>
    <p>08:00 – 14:00</p>
  </section>

  <!-- FINALE -->
  <section class="section light">
    <h2>Grazie!</h2>
    <img src="assets/img/finale.png" alt="Finale"
         class="menu-img"
         onerror="this.src='finale.png'">
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Bar Scolastico</p>
  </footer>

  <!-- SCRIPT -->
  <script>
    // Carica username
    window.onload = function() {
      const username = localStorage.getItem("username");

      if (username) {
        document.getElementById("usernameDisplay").innerText =
          "Benvenuto, " + username + "!";
        document.getElementById("usernameInput").value = username;

        // 🔥 scroll automatico alla copertina
        document.getElementById("hero").scrollIntoView({ behavior: "smooth" });
      }
    };

    function salvaUsername() {
      const username = document.getElementById("usernameInput").value;

      if (username.trim() === "") {
        alert("Inserisci uno username valido!");
        return;
      }

      localStorage.setItem("username", username);

      document.getElementById("usernameDisplay").innerText =
        "Benvenuto, " + username + "!";

      // 🔥 scroll automatico alla copertina
      document.getElementById("hero").scrollIntoView({ behavior: "smooth" });
    }
  </script>

</body>
</html>
